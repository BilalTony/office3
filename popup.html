<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            width: 250px;
            padding: 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f9f9fb;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        h2 {
            margin: 0 0 5px 0;
            font-size: 16px;
            color: #1a1a1a;
        }

        .stats {
            font-size: 13px;
            color: #666;
            background: #eee;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 5px;
        }

        .btn {
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: background 0.2s;
        }

        .btn-download {
            background-color: #2563eb;
            color: white;
        }

        .btn-download:hover {
            background-color: #1d4ed8;
        }

        .btn-clear {
            background-color: #ef4444;
            color: white;
            margin-top: 5px;
        }

        .btn-clear:hover {
            background-color: #dc2626;
        }

        .footer {
            font-size: 11px;
            color: #aaa;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Warden Activity Log</h2>
        <div class="stats" id="logCountText">Loading logs...</div>

        <button id="dashboardBtn" class="btn" style="background-color: #6366f1; color: white; margin-top: 5px;">View
            Intelligence Dashboard</button>
    </div>
    <script src="popup.js"></script>
</body>

</html>
